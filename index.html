<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lego Man | Developer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }
    header {
      text-align: center;
      padding: 60px 20px;
    }
    h1 {
      font-size: 3rem;
    }
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      transition: 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    a {
      color: #38bdf8;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
  <h1>Lego Man</h1>
  <p>I build apps & games</p>
</header>

<section class="projects">

  <div class="card">
    <h2>Flappy Car 🚗</h2>
    <p>A car version of Flappy Bird</p>
    <a href="/flappycar">Play →</a>
  </div>

</section>

</body>
</html>
